# Butterfly Hunt — Georgia Tech Campus
#
# Butterflies spawn at random locations across campus every 60 minutes (10 per batch).
# Walk within 10 meters of one to catch it.
#
# This example demonstrates two complementary patterns for keeping mesh waypoints
# visible to all players despite radio congestion:
#
#   1. refresh_mins on create_waypoint — each waypoint re-broadcasts itself on its
#      channel every 5 minutes so clients that missed the initial send catch up.
#
#   2. force_refresh_waypoint on zone entry — when a player enters the campus,
#      the nearest uncaught butterfly is immediately re-broadcast. A
#      refresh_cooldown_mins on the waypoint prevents a crowd of arrivals from
#      flooding the channel.

channels:
  - label: comms
    name: Testing123
    psk: AQ==
    monitor: true
    participate: true

zones:
  - label: gt_campus
    # Main Georgia Tech campus — North Ave to 5th St, Techwood to Spring St
    points:
      - [33.7785, -84.4005]   # northwest (Techwood Dr & 5th St)
      - [33.7785, -84.3910]   # northeast (Spring St & 5th St)
      - [33.7710, -84.3960]   # south (North Ave / Freshman Hill)

flags:
  - label: butterfly
    expiry_mins: 60

messages:
  - label: caught
    text: "🦋 {node_id} caught a wild butterfly!"

events:
  # ---------------------------------------------------------------------------
  # Spawn 10 butterflies at start; respawn every 60 minutes.
  # refresh_mins: 5          — re-broadcast each waypoint every 5 minutes so
  #                            clients that missed the initial send catch up.
  # refresh_cooldown_mins: 2 — prevents force_refresh_waypoint (below) from
  #                            re-broadcasting the same waypoint more than once
  #                            per 2 minutes when many players enter at once.
  # ---------------------------------------------------------------------------
  - label: spawn_butterflies
    trigger:
      type: time_window
      start: "2020-01-01T00:00:00"
      end:   "2099-01-01T00:00:00"
    auto_recur: true
    recur_mins: 60
    responses:
      - type: repeat
        count: 10
        responses:
          - type: create_waypoint
            randomly_in_zone: gt_campus
            expiry_mins: 60
            refresh_mins: 5
            refresh_cooldown_mins: 2
            initial_flags:
              - butterfly
            mesh_name: "🦋 butterfly #{waypoint_id}"
            mesh_icon: 129419      # 🦋
            mesh_channel: comms

  # ---------------------------------------------------------------------------
  # When a player enters the campus, immediately re-broadcast the nearest
  # uncaught butterfly to help it appear on their map without waiting for the
  # next scheduled refresh.
  # ---------------------------------------------------------------------------
  - label: refresh_on_enter
    trigger:
      type: enters_zone
      target: gt_campus
    responses:
      - type: force_refresh_waypoint
        flag_label: butterfly

  # ---------------------------------------------------------------------------
  # Catch a butterfly — walk within 10 meters.
  # ---------------------------------------------------------------------------
  - label: catch_butterfly
    trigger:
      type: near_waypoint
      target_flag: butterfly
      meters: 10
    responses:
      - type: send_message
        message_label: caught
        to_channel: comms
      - type: delete_mesh_waypoint
        use_triggering_waypoint: true
      - type: destroy_waypoint

  # ---------------------------------------------------------------------------
  # Clean up mesh waypoint when a butterfly expires naturally after 60 minutes.
  # ---------------------------------------------------------------------------
  - label: butterfly_expired
    trigger:
      type: flag_expired
      flag_label: butterfly
      target_kind: dynamic_waypoint
    responses:
      - type: delete_mesh_waypoint
        use_triggering_waypoint: true
