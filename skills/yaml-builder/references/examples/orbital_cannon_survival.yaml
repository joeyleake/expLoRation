# expLoRation — Orbital Cannon Survival
#
# OPEN ENROLLMENT — any node in a game zone is automatically a valid target.
# Nodes that leave all zones lose valid_target and are safe until they re-enter.
#
# GAME FLOW:
#   1. Bot starts — cannon arms automatically
#   2. Any node entering a game zone gets flagged valid_target
#   3. Every 15 min the cannon picks one random valid_target node
#   4. A dynamic waypoint is stamped at that node's location (laser_target, 10-min expiry)
#   5. Channel warns all nodes near the strike point to flee
#   6. laser_target expires → blast fires (95%) or misfires (5%)
#   7. Nodes within 8047m of impact get in_blast_zone (6-sec expiry)
#   8. in_blast_zone expires → node marked destroyed (permanent)
#   9. Status report every 60 minutes
#  10. Game ends when one or zero valid_target nodes remain
#
# PLAY AREA: Mountain Mesh coverage area — update zone coordinates before use.

channels:
  - label: comms
    name: Testing123
    psk: AQ==
    monitor: true
    participate: true

# ===========================================================================
# ZONES — Mountain Mesh coverage grid
# Nodes in ANY of these zones are valid targets.
# ===========================================================================

