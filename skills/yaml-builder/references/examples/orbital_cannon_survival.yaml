  # ---------------------------------------------------------------------------
  # ZONE EXIT — node leaving a zone loses valid_target
  # Since zones are adjacent, a node moving between zones will trigger
  # leaves_zone on the old zone and enters_zone on the new zone. The
  # node_has_flag: valid_target exception on entry events prevents
  # double-announcing. The leaves_zone event removes valid_target, and
  # the enters_zone on the new zone immediately re-adds it — net effect
  # is no disruption for zone-to-zone movement within the play area.
  # A node leaving the play area entirely will lose valid_target and not
  # re-acquire it until it enters a zone again.
  # ---------------------------------------------------------------------------

  - label: leave_chattanooga_fringe_a
    trigger:
      type: leaves_zone
      target: chattanooga_fringe_a
    trigger_per_node: true
    exceptions:
      - kind: node_lacks_flag
        flag: valid_target
      - kind: node_has_flag
        flag: destroyed
    responses:
      - type: remove_flag
        flag_label: valid_target
        to_triggering_node: true
      - type: send_message
        message_label: left_play_area
        to_triggering_node: true

  - label: leave_atlanta_core_a
    trigger:
      type: leaves_zone
