# ===========================================================================
# GROUPS
# ===========================================================================

groups:
  - label: game_zones
    kind: zone
    initial_members:
      - chattanooga_fringe_a
      - chattanooga_fringe_b
      - ocoee_corridor_a
      - ocoee_corridor_b
      - hiwassee_murphy_a
      - hiwassee_murphy_b
      - cohutta_dalton_a
      - cohutta_dalton_b
      - ellijay_cartecay_a
      - ellijay_cartecay_b
      - blue_ridge_morganton_a
      - blue_ridge_morganton_b
      - toccoa_cornelia_a
      - toccoa_cornelia_b
      - calhoun_rome_a
      - calhoun_rome_b
      - canton_hickory_flat_a
      - canton_hickory_flat_b
      - gainesville_hall_a
      - gainesville_hall_b
      - anderson_sc_fringe_a
      - anderson_sc_fringe_b
      - roswell_alpharetta_a
      - roswell_alpharetta_b
