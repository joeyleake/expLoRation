      - conyers_covington_b
      - south_atlanta_a
      - south_atlanta_b

# ===========================================================================
# FLAGS
# ===========================================================================

flags:
  - label: valid_target                # node is currently in a game zone
  - label: destroyed                   # node has been permanently vaporized
  - label: game_over                   # anchored on chattanooga_fringe_a
  - label: laser_target
    expiry_mins: 10
  - label: in_blast_zone
    expiry_mins: .1

# ===========================================================================
# VARIABLES
# ===========================================================================

mutable_variables:
  - label: destroyed_count
    type: integer
    scope: global
    initial: 0
    min: 0

variables:
  - label: valid_target_count
    scope: global
    tracks: flag_count
    target: valid_target

# ===========================================================================
# MESSAGES
# ===========================================================================

messages:

  - label: new_target_announce
    text: "🎯 NEW TARGET: {node_id} has entered the grid in zone {zone}."

  - label: target_locked
    text: "⦻ LOCK ON: {node_id}. Target in {zone} painted. If you're within 5 miles — MOVE! You have 10 minutes."

  - label: blast_msg_1
    text: "💥 ORBITAL STRIKE EXECUTED. The cannon has delivered its payload with extreme prejudice."

  - label: blast_msg_2
    text: "☄️ DIRECT HIT CONFIRMED. From way downtown, BANG!"

  - label: blast_msg_3
    text: "🚀 ORDNANCE DELIVERED. The crater will make a lovely memorial."

  - label: blast_msg_4
    text: "⚡ KINETIC STRIKE COMPLETE. The target area has been enthusiastically rearranged at the molecular level."

  - label: blast_msg_5
    text: "🔥 BEAM FIRED. High-fives all around at Orbital Weapons HQ."

  - label: misfire_msg
    text: "🔧 CANNON MALFUNCTION DETECTED. The orbital strike team apologizes. This will not happen again."

  - label: obliterated_1
    text: "💀 {node_id} — VAPORIZED"

  - label: obliterated_2
    text: "☠️ {node_id} — SCRAPPED"

  - label: obliterated_3
    text: "🔥 {node_id} — CARBONIZED"

  - label: obliterated_4
    text: "⚡ {node_id} — FRIED"

  - label: obliterated_5
    text: "🪦 {node_id} — ANNIHILATED"

  - label: status_msg
    text: |
      📡 CANNON STATUS
      🟢 Active: {valid_target_count}  🔴 Destroyed: {destroyed_count}
      🛰️ Cannon is reloading...

  - label: last_survivor_msg
    text: |
      🏆 ONE NODE STANDING!
      The cannon has run out of valid targets. Boo.
      ☠️ Destroyed: {destroyed_count}
      Well played.

  - label: everyone_dead_msg
    text: |
      💥 TOTAL COVERAGE ACHIEVED.
      Every node eliminated. The mesh is silent.
      ☠️ Destroyed: {destroyed_count}
      The cannon won.

# ===========================================================================
# EVENTS
# ===========================================================================

events:

  # ---------------------------------------------------------------------------
  # ZONE ENTRY / EXIT — any node entering or leaving any game zone
  # A single event per direction handles all 30 zones via the game_zones group.
  # The node_has_flag: valid_target exception prevents duplicate flagging
  # when a node crosses a zone boundary from one game zone to another.
  # ---------------------------------------------------------------------------

  - label: enter_game_zone
    trigger:
      type: enters_zone_group
      zone_group: game_zones
    trigger_per_node: true
    exceptions:
      - kind: node_has_flag
        flag: valid_target
      - kind: node_has_flag
        flag: destroyed
      - kind: zone_has_flag
        flag: game_over
        target: chattanooga_fringe_a
    responses:
      - type: add_flag
        flag_label: valid_target
        to_triggering_node: true
      - type: send_message
        message_label: new_target_announce
        to_channel: comms

  - label: leave_game_zone
    trigger:
      type: leaves_zone_group
      zone_group: game_zones
    trigger_per_node: true
    exceptions:
      - kind: node_lacks_flag
        flag: valid_target
      - kind: node_has_flag
        flag: destroyed
    responses:
      - type: remove_flag
        flag_label: valid_target
        to_triggering_node: true

  # ---------------------------------------------------------------------------
  # CANNON SELECTOR — fires every 15 min, picks one random valid_target node
  # ---------------------------------------------------------------------------

  - label: cannon_selector
    trigger:
      type: time_window
      start: "2020-01-01T00:00:00"
      end:   "2099-01-01T00:00:00"
    auto_recur: true
    recur_mins: 15
    exceptions:
      - kind: zone_has_flag
        flag: game_over
        target: chattanooga_fringe_a
    responses:
      - type: with_node
        to_all_with_flag: valid_target
        random_n: 1
        responses:
          - type: create_waypoint
            expiry_mins: 15
            initial_flags:
              - laser_target
            mesh_name: "🎯 TARGET LOCK"
            mesh_description: "Evacuate immediately."
            mesh_channel: comms
          - type: send_message
            message_label: target_locked
            to_channel: comms

  # ---------------------------------------------------------------------------
  # BLAST EVENT — fires when laser_target expires; 95% hit, 5% misfire
  # ---------------------------------------------------------------------------

  - label: blast_event
    trigger:
      type: flag_expired
      flag_label: laser_target
      target_kind: dynamic_waypoint
    exceptions:
      - kind: zone_has_flag
        flag: game_over
        target: chattanooga_fringe_a
    responses:
      - type: delete_mesh_waypoint
        use_triggering_waypoint: true
      - type: random_options
        options:
          - weight: 95
            responses:
              - type: add_flag
                flag_label: in_blast_zone
                to_all_near_triggering_waypoint:
                  meters: 8047
              - type: random_options
                options:
                  - weight: 1
                    responses:
                      - type: send_message
                        message_label: blast_msg_1
                        to_channel: comms
                  - weight: 1
                    responses:
                      - type: send_message
                        message_label: blast_msg_2
                        to_channel: comms
                  - weight: 1
                    responses:
                      - type: send_message
                        message_label: blast_msg_3
                        to_channel: comms
                  - weight: 1
                    responses:
                      - type: send_message
                        message_label: blast_msg_4
                        to_channel: comms
                  - weight: 1
                    responses:
                      - type: send_message
                        message_label: blast_msg_5
                        to_channel: comms
          - weight: 5
            responses:
              - type: send_message
                message_label: misfire_msg
                to_channel: comms

  # ---------------------------------------------------------------------------
  # NODE DESTROYED — fires per node when in_blast_zone expires
  # ---------------------------------------------------------------------------

  - label: node_destroyed
    trigger:
      type: flag_expired
      flag_label: in_blast_zone
      target_kind: node
    trigger_per_node: true
    exceptions:
      - kind: node_has_flag
        flag: destroyed
      - kind: zone_has_flag
        flag: game_over
        target: chattanooga_fringe_a
    responses:
      - type: add_flag
        flag_label: destroyed
        to_triggering_node: true
      - type: remove_flag
        flag_label: valid_target
        to_triggering_node: true
      - type: increment_variable
        variable_label: destroyed_count
        amount: 1
      - type: random_options
        options:
          - weight: 1
            responses:
              - type: send_message
                message_label: obliterated_1
                to_channel: comms
          - weight: 1
            responses:
              - type: send_message
                message_label: obliterated_2
                to_channel: comms
          - weight: 1
            responses:
              - type: send_message
                message_label: obliterated_3
                to_channel: comms
          - weight: 1
            responses:
              - type: send_message
                message_label: obliterated_4
                to_channel: comms
          - weight: 1
            responses:
              - type: send_message
                message_label: obliterated_5
                to_channel: comms

  # ---------------------------------------------------------------------------
  # STATUS UPDATE — broadcast active/destroyed counts every 60 minutes
  # ---------------------------------------------------------------------------

  - label: status_update
    trigger:
      type: time_window
      start: "2020-01-01T00:00:00"
      end:   "2099-01-01T00:00:00"
    auto_recur: true
    recur_mins: 60
    exceptions:
      - kind: zone_has_flag
        flag: game_over
        target: chattanooga_fringe_a
    responses:
      - type: send_message
        message_label: status_msg
        to_channel: comms

  # ---------------------------------------------------------------------------
  # LAST SURVIVOR — valid_target_count drops to 1
  # ---------------------------------------------------------------------------

  - label: last_survivor
    trigger:
      type: variable_threshold
      variable: valid_target_count
      operator: eq
      value: 1
    max_triggers: 1
    exceptions:
      - kind: zone_has_flag
        flag: game_over
        target: chattanooga_fringe_a
    responses:
      - type: add_flag
        flag_label: game_over
        to_zone: chattanooga_fringe_a
      - type: disable_event
        event_label: cannon_selector
      - type: disable_event
        event_label: status_update
      - type: send_message
        message_label: last_survivor_msg
        to_channel: comms

  # ---------------------------------------------------------------------------
  # EVERYONE LOSES — valid_target_count drops to 0
  # ---------------------------------------------------------------------------

  - label: everyone_loses
    trigger:
      type: variable_threshold
      variable: valid_target_count
      operator: eq
      value: 0
    max_triggers: 1
    exceptions:
      - kind: zone_has_flag
        flag: game_over
        target: chattanooga_fringe_a
    responses:
      - type: add_flag
        flag_label: game_over
        to_zone: chattanooga_fringe_a
      - type: disable_event
        event_label: cannon_selector
      - type: disable_event
        event_label: status_update
      - type: send_message
        message_label: everyone_dead_msg
        to_channel: comms
