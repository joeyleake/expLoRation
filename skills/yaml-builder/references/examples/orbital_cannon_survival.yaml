# expLoRation — Orbital Cannon Survival
#
# An orbital laser cannon locks onto a random node every hour, stamps a
# dynamic waypoint at its location, and fires 30 minutes later. Any node
# within 1 mile (~1609m) of the impact point gets destroyed.
#
# OPEN ENROLLMENT — no signup required. Any node that appears in any
# game zone automatically becomes a valid target. Nodes that move out
# of all game zones lose their valid_target flag and are safe until
# they re-enter. New nodes can join at any time and are immediately
# at risk. There is no escape from the cannon. Only geography.
#
# GAME FLOW:
#   1. Bot starts — cannon arms automatically via time_window
#   2. Any node entering a game zone gets flagged valid_target
#   3. Every hour the cannon picks one random valid_target node
#   4. A dynamic waypoint is stamped at that node's current location
#      with the laser_target flag (30-min expiry)
#   5. Channel announcement warns all nodes to flee
#   6. 30 minutes later laser_target expires → blast fires
#   7. All nodes within 1609m of impact get in_blast_zone (1-min expiry)
#   8. in_blast_zone expires → node marked destroyed (permanent)
#   9. 5% misfire chance — no destruction, cannon sulks
#  10. Status report every 15 minutes
#  11. Game ends when one or zero valid_target nodes remain
#
# PLAY AREA: Mountain Mesh coverage area — replace coordinates before use.

channels:
  - label: comms
    name: BoomWatch
    psk: Hne8kaQG/BqFuqfjIjFgbddEt63coqWTFhNiSvsFpCk=
    monitor: true
    participate: true

