# ===========================================================================
# FLAGS
# ===========================================================================

flags:
  - label: valid_target                # node is currently in a game zone
  - label: destroyed                   # node has been permanently vaporized
  - label: game_over                   # anchored on chattanooga_fringe_a
  - label: laser_target
    expiry_mins: 30
  - label: in_blast_zone
    expiry_mins: 1

# ===========================================================================
# VARIABLES
# ===========================================================================

mutable_variables:
  - label: destroyed_count
    type: integer
    scope: global
    initial: 0
    min: 0

variables:
  - label: valid_target_count
    scope: global
    tracks: flag_count
    target: valid_target

# ===========================================================================
# MESSAGES
# ===========================================================================

messages:

  - label: entered_play_area
    text: "🛰️ You have entered the orbital cannon's targeting grid. You are now a valid target. Good luck."

  - label: left_play_area
    text: "✅ You have left the targeting grid. The cannon cannot lock onto you while you're outside the play area. Don't get too comfortable."

  - label: new_target_announce
    text: "📡 NEW NODE DETECTED in the targeting grid. The cannon has updated its target list. Welcome to the game. We're sorry about that."

  - label: target_locked
    text: |
      🛰️  ORBITAL CANNON — TARGETING LOCK CONFIRMED 🛰️

      The satellite has acquired a target. A strike waypoint has been
      marked on the mesh. You have EXACTLY 30 minutes to evacuate the
      blast radius. That is approximately 1 mile in every direction
      from the marked point.

      The cannon does not negotiate. The cannon does not miss.
      (Mostly.)

  - label: blast_msg_1
    text: "💥 ORBITAL STRIKE EXECUTED. The cannon has delivered its payload with extreme prejudice. Nothing survives 400km of freefall."

  - label: blast_msg_2
    text: "☄️ DIRECT HIT CONFIRMED. The satellite operators are extremely pleased. Ground zero is no longer a viable address."

  - label: blast_msg_3
    text: "🚀 ORDNANCE DELIVERED. Strike zone impact verified. The crater will make a lovely memorial. We'll send flowers."

  - label: blast_msg_4
    text: "⚡ KINETIC STRIKE COMPLETE. The target area has been enthusiastically rearranged at the molecular level."

  - label: blast_msg_5
    text: "🔥 BEAM FIRED. The orbital weapons team has logged this as a successful outcome. The nodes in range may disagree."

  - label: misfire_msg
    text: "🔧 CANNON MALFUNCTION DETECTED. A coolant line has ruptured in the targeting module. The orbital strike team apologizes. This will not happen again. (It might happen again.)"

  - label: obliterated_1
    text: "💀 NODE VAPORIZED. Gone. Atomized. Scattered tastefully across the stratosphere."

  - label: obliterated_2
    text: "☠️ CRITICAL HIT! That node has been converted from a mesh participant into a high-velocity debris field."

  - label: obliterated_3
    text: "🔥 OBLITERATED. The cannon has concluded that node's atmospheric career. It fought bravely and poorly."

  - label: obliterated_4
    text: "⚡ DIRECT STRIKE! All that remains is a faint ionization trail and some very expensive thermal damage."

  - label: obliterated_5
    text: "🌪️ TURNED INTO A SMOLDERING MEMORY. The node has been encouraged to leave the game permanently."

  - label: status_msg
    text: |
      📡 CANNON STATUS REPORT
      ━━━━━━━━━━━━━━━━━━
      🟢 Active targets:  {valid_target_count}
      ☠️  Nodes destroyed: {destroyed_count}
      🛰️  Cannon is reloading...
      ━━━━━━━━━━━━━━━━━━

  - label: last_survivor_msg
    text: |
      🏆 ONE NODE STILL STANDING!

      Against all odds, a single node still blips on the tracking radar.
      The orbital cannon has run out of valid targets. It is sulking.

      FINAL STATS
      ━━━━━━━━━━━━━━━━━━
      ☠️  Nodes destroyed: {destroyed_count}
      ━━━━━━━━━━━━━━━━━━
      The last node survived by being somewhere the cannon wasn't.
      Well played.

  - label: everyone_dead_msg
    text: |
      💥 TOTAL COVERAGE ACHIEVED.

      The orbital cannon has eliminated every last node in the play area.
      The mesh is completely silent. The satellite operators are celebrating
      with champagne and deeply unsettling high-fives.

      FINAL STATS
      ━━━━━━━━━━━━━━━━━━
      ☠️  Nodes destroyed: {destroyed_count}
      ━━━━━━━━━━━━━━━━━━
      Nobody won. The cannon won. As it always does.

# ===========================================================================
# EVENTS
# ===========================================================================

events:

  # ---------------------------------------------------------------------------
  # ZONE ENTRY — any node entering any game zone gets valid_target
  # One event per populated zone. Empty zones omitted for brevity.
  # The node_has_flag: valid_target exception prevents duplicate flagging
  # when a node crosses a zone boundary from one game zone to another.
  # ---------------------------------------------------------------------------

  - label: enter_chattanooga_fringe_a
    trigger:
      type: enters_zone
      target: chattanooga_fringe_a
    trigger_per_node: true
    exceptions:
      - kind: node_has_flag
        flag: valid_target
      - kind: node_has_flag
        flag: destroyed
      - kind: zone_has_flag
        flag: game_over
        target: chattanooga_fringe_a
    responses:
      - type: add_flag
        flag_label: valid_target
        to_triggering_node: true
      - type: send_message
        message_label: entered_play_area
        to_triggering_node: true
      - type: send_message
        message_label: new_target_announce
        to_channel: comms

