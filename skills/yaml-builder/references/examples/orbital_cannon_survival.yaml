  # ---------------------------------------------------------------------------
  # CANNON SELECTOR — fires hourly
  # Picks ONE random valid_target node via with_node + random_n: 1,
  # creates a dynamic waypoint at its location with laser_target flag.
  # ---------------------------------------------------------------------------

  - label: cannon_selector
    trigger:
      type: time_window
      start: "2020-01-01T00:00:00"
      end:   "2099-01-01T00:00:00"
    auto_recur: true
    recur_mins: 60
    exceptions:
      - kind: zone_has_flag
        flag: game_over
        target: chattanooga_fringe_a
    responses:
      - type: with_node
        to_all_with_flag: valid_target
        random_n: 1
        responses:
          - type: create_waypoint
            expiry_mins: 60
            initial_flags:
              - laser_target
      - type: send_message
        message_label: target_locked
        to_channel: comms

  # ---------------------------------------------------------------------------
  # BLAST EVENT — fires when laser_target expires on the dynamic waypoint
  # 5% misfire via random_skip.
  # On hit: tag all nodes within 1 mile of the impact waypoint.
  # ---------------------------------------------------------------------------

  - label: blast_event
    trigger:
      type: flag_expired
      flag_label: laser_target
      target_kind: dynamic_waypoint
    exceptions:
      - kind: zone_has_flag
        flag: game_over
        target: chattanooga_fringe_a
      - kind: random_skip
        chance: 0.05
    responses:
      - type: add_flag
        flag_label: in_blast_zone
        to_all_near_triggering_waypoint:
          meters: 1609
      - type: random_options
        options:
          - weight: 1
            responses:
              - type: send_message
                message_label: blast_msg_1
                to_channel: comms
          - weight: 1
            responses:
              - type: send_message
                message_label: blast_msg_2
                to_channel: comms
          - weight: 1
            responses:
              - type: send_message
                message_label: blast_msg_3
                to_channel: comms
          - weight: 1
            responses:
              - type: send_message
                message_label: blast_msg_4
                to_channel: comms
          - weight: 1
            responses:
              - type: send_message
                message_label: blast_msg_5
                to_channel: comms

  # ---------------------------------------------------------------------------
  # MISFIRE ANNOUNCEMENT — inverse of blast_event's random_skip
  # Fires only in the 5% window where blast_event is skipped.
  # ---------------------------------------------------------------------------

  - label: misfire_announcement
    trigger:
      type: flag_expired
      flag_label: laser_target
      target_kind: dynamic_waypoint
    exceptions:
      - kind: zone_has_flag
        flag: game_over
        target: chattanooga_fringe_a
      - kind: random_skip
        chance: 0.95
    responses:
      - type: send_message
        message_label: misfire_msg
        to_channel: comms

  # ---------------------------------------------------------------------------
  # NODE DESTROYED — fires when in_blast_zone expires on a node
  # Marks node destroyed, removes valid_target so it can't be targeted again,
  # increments destroyed_count, announces destruction.
  # ---------------------------------------------------------------------------

  - label: node_destroyed
    trigger:
      type: flag_expired
      flag_label: in_blast_zone
      target_kind: node
    trigger_per_node: true
    exceptions:
      - kind: node_has_flag
        flag: destroyed
      - kind: zone_has_flag
        flag: game_over
        target: chattanooga_fringe_a
    responses:
      - type: add_flag
        flag_label: destroyed
        to_triggering_node: true
      - type: remove_flag
        flag_label: valid_target
        to_triggering_node: true
      - type: increment_variable
        variable_label: destroyed_count
        amount: 1
      - type: random_options
        options:
          - weight: 1
            responses:
              - type: send_message
                message_label: obliterated_1
                to_channel: comms
          - weight: 1
            responses:
              - type: send_message
                message_label: obliterated_2
                to_channel: comms
          - weight: 1
            responses:
              - type: send_message
                message_label: obliterated_3
                to_channel: comms
          - weight: 1
            responses:
              - type: send_message
                message_label: obliterated_4
                to_channel: comms
          - weight: 1
            responses:
              - type: send_message
                message_label: obliterated_5
                to_channel: comms

  # ---------------------------------------------------------------------------
  # STATUS UPDATE — broadcast active/destroyed counts every 15 minutes
  # ---------------------------------------------------------------------------

  - label: status_update
    trigger:
      type: time_window
      start: "2020-01-01T00:00:00"
      end:   "2099-01-01T00:00:00"
    auto_recur: true
    recur_mins: 15
    exceptions:
      - kind: zone_has_flag
        flag: game_over
        target: chattanooga_fringe_a
    responses:
      - type: send_message
        message_label: status_msg
        to_channel: comms

  # ---------------------------------------------------------------------------
  # LAST SURVIVOR — valid_target_count drops to 1
  # Uses the computed valid_target_count variable which tracks the flag_count
  # of valid_target in real time, so new joiners and destroyed nodes are
  # automatically reflected. No hardcoded player count needed.
  # ---------------------------------------------------------------------------

  - label: last_survivor
    trigger:
      type: variable_threshold
      variable: valid_target_count
      operator: eq
      value: 1
    max_triggers: 1
    exceptions:
      - kind: zone_has_flag
        flag: game_over
        target: chattanooga_fringe_a
    responses:
      - type: add_flag
        flag_label: game_over
        to_zone: chattanooga_fringe_a
      - type: disable_event
        event_label: cannon_selector
      - type: disable_event
        event_label: status_update
      - type: send_message
        message_label: last_survivor_msg
        to_channel: comms

  # ---------------------------------------------------------------------------
  # EVERYONE LOSES — valid_target_count drops to 0
  # Handles the case where a blast destroys all remaining nodes at once.
  # ---------------------------------------------------------------------------

  - label: everyone_loses
    trigger:
      type: variable_threshold
      variable: valid_target_count
      operator: eq
      value: 0
    max_triggers: 1
    exceptions:
      - kind: zone_has_flag
        flag: game_over
        target: chattanooga_fringe_a
    responses:
      - type: add_flag
        flag_label: game_over
        to_zone: chattanooga_fringe_a
      - type: disable_event
        event_label: cannon_selector
      - type: disable_event
        event_label: status_update
      - type: send_message
        message_label: everyone_dead_msg
        to_channel: comms
