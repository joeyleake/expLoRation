# expLoRation — example security system

channels:
  - label: testchan
    name: Testing123
    psk: Hne8kaQG/BqFuqfjIjFgbddEt63coqWTFhNiSvsFpCk=
    monitor: true
    participate: true

zones:
  - label: neighborhood_1
    points:
      - [34.142133, -84.440022] # top left
      - [34.122631, -84.440022] # bottom left
      - [34.122631, -84.426418] # bottom right

  - label: neighborhood_2
    points:
      - [34.122631, -84.426418] # bottom right
      - [34.142133, -84.426418] # top right
      - [34.142133, -84.440022] # top left

waypoints:
  - label: my_house
    lat: 34.1331832337908
    lon: -84.433555587631

nodes:
  - label: my_node
    node_id: "!043906b8"
    initial_flags:
      - homeowner

  - label: game_bot
    node_id: "!04069c44"
    initial_flags:
      - homeowner

  - label: home_node
    node_id: "!043ada10"
    initial_flags:
      - homeowner

variables:
  - label: n1_count
    scope: zone
    tracks: node_count
    target: neighborhood_1

  - label: n2_count
    scope: zone
    tracks: node_count
    target: neighborhood_2

messages:
  - label: hourly_report
    text: "🔍 Hourly Security Report — Neighborhood 1: {n1_count} node(s) | Neighborhood 2: {n2_count} node(s)"

  - label: intruder_notice
    text: "🫆 Suspect has entered the protected zone. 🫆"

  - label: near_house
    text: "🚨 Suspect is within 1km of house! 🚨"

  - label: near_you
    text: "💀 Suspect is within 500 meters of YOU! 💀"

flags:
  - label: homeowner
  - label: intruder
  - label: suspect
  - label: wannabe-assassin

events:
  # -----------------------------------------------------------------------
  # Hourly report
  # -----------------------------------------------------------------------
  - label: hourly_occupancy_broadcast
    trigger:
      type: in_zone_on_start
      target: neighborhood_1
    auto_recur: true
    recur_mins: 60
    responses:
      - type: send_message
        message_label: hourly_report
        to_channel: testchan

  # -----------------------------------------------------------------------
  # Proximity: Alert on any node entering neighborhood_1
  # -----------------------------------------------------------------------
  - label: enter_neighborhood_1
    trigger:
      type: in_zone
      target: neighborhood_1
    trigger_per_node: true
    responses:
      - type: add_flag
        flag_label: suspect
        to_triggering_node: true
      - type: send_message
        message_label: intruder_notice
        to_channel: testchan
    exceptions:
      - kind: node_has_flag
        flag: homeowner
    reset_mins: 10

  # -----------------------------------------------------------------------
  # Proximity: Alert on any node entering neighborhood_2
  # -----------------------------------------------------------------------
  - label: enter_neighborhood_2
    trigger:
      type: in_zone
      target: neighborhood_2
    trigger_per_node: true
    responses:
      - type: add_flag
        flag_label: suspect
        to_triggering_node: true
      - type: send_message
        message_label: intruder_notice
        to_channel: testchan
    exceptions:
      - kind: node_has_flag
        flag: homeowner
    reset_mins: 10

  # -----------------------------------------------------------------------
  # Proximity: Alert on any node nearing home
  # -----------------------------------------------------------------------
  - label: nearing_home
    trigger:
      type: near_waypoint
      target: my_house
      meters: 1000
    trigger_per_node: true
    responses:
      - type: add_flag
        flag_label: intruder
        to_triggering_node: true
      - type: send_message
        message_label: near_house
        to_node: my_node
      - type: send_message
        message_label: near_house
        to_channel: testchan
    exceptions:
      - kind: node_has_flag
        flag: homeowner
    reset_mins: 10

  # -----------------------------------------------------------------------
  # Proximity: Alert on any node nearing personal node
  # -----------------------------------------------------------------------
  - label: nearing_you
    trigger:
      type: near_node
      target: my_node
      meters: 500
    trigger_per_node: true
    responses:
      - type: add_flag
        flag_label: wannabe-assassin
        to_triggering_node: true
      - type: send_message
        message_label: near_you
        to_node: my_node
      - type: send_message
        message_label: near_you
        to_channel: testchan
    exceptions:
      - kind: node_has_flag
        flag: homeowner
    reset_mins: 10
